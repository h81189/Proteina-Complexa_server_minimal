# TED Dimers - Unified DataModule config
# Pre-cropped dimers with chains A and B for binder training
#
# Pipeline: PDB/CIF → AtomArray → atomarray_transforms → atom37 Data → atom37_transforms → model
#
# Note: For dimers WITH ligands, use ted_dimers_ligand.yaml which uses
# pipeline mode with atomworks transforms for proper ligand handling.

datamodule:
  _target_: proteinfoundation.datasets.structure_data.StructureDataModule
  metadata_file: ${oc.env:DATA_PATH}/latent_train_parquet_files/ted_dimers.parquet
  base_dir: ""  # Paths in parquet are absolute
  batch_size: 6
  num_workers: 16
  train_split: 0.99
  path_column: path
  id_column: example_id
  pin_memory: true
  
  # atom37_transforms applied to Data object
  atom37_transforms:
    - _target_: proteinfoundation.datasets.transforms.CoordsToNanometers
    - _target_: proteinfoundation.datasets.transforms.GlobalRotationTransform
    # No TEDDimerTransform needed - files are already pre-cropped dimers
    - _target_: proteinfoundation.datasets.transforms.CroppingTransform2
      crop_size: 500
      interface_threshold: 8.0
      dist_mode: "bb_ca"
      data_mode: "all-atom"
      binder_min_length: 1
      binder_max_length: 250
      binder_padding_length: 0
      target_min_length: 50
      target_spatial_crop_threshold: 15.0
      max_num_target_chains: -1
    - _target_: proteinfoundation.datasets.transforms.ContactTransform
      cutoff: 8.0
      min_perc: 0.0
      max_perc: 0.2
      contact_prob: 1.0
      contact_dropout_prob: 0.5
      hotspot_dropout_prob: 0.5
    - _target_: proteinfoundation.datasets.transforms.OpenFoldFrameTransform
    - _target_: proteinfoundation.datasets.transforms.ChainBreakPerResidueTransform
    - _target_: proteinfoundation.datasets.transforms.CenteringTransform
      center_mode: "target"
      data_mode: "all-atom"
    - _target_: proteinfoundation.datasets.transforms.ExtractTargetCoordinatesTransform
      compact_mode: true
    - _target_: proteinfoundation.datasets.transforms.FilterTargetResiduesTransform
