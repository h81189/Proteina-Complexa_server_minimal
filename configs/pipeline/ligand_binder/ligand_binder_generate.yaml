    #     surface_hydrophobicity: 0.0
    #     interface_sc: 1.0
    #     interface_dSASA: 0.0
    #     interface_fraction: 0.0
    #     interface_hydrophobicity: 1.0
    #     interface_nres: 0.0
    #   reward_thresholds:
    #     surface_hydrophobicity: 0.35
    #     interface_sc: 0.55
    #     interface_dSASA: 1.0
    #     interface_fraction: null
    #     interface_hydrophobicity: null
    #     interface_nres: 7
