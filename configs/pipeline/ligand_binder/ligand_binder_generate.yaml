# =============================================================================
# Post-generation filtering (used by filter.py)
# =============================================================================
filter:
  filter_samples_limit: 1000
  delete_non_top_n_samples: true
  dedup_sequence: true
  reward_threshold: null

# =============================================================================
# Refinement
# =============================================================================
refinement:
  algorithm: null  # Options: null, gradient_ascent, sequence_hallucination
  enable_soft_optimization: false
  enable_greedy_optimization: true
  n_temp_iters: 45
  n_hard_iters: 5
  n_recycles: 3
  n_greedy_iters: 15
  greedy_percentage: 1
