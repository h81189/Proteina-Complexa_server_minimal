# AME (Motif + Ligand Binder) Generation Configuration
#
# Combines motif features (atom-spec mode) and ligand features for AME tasks.
# Both are centered at the motif center of mass before generation.

defaults:
  - /design_tasks/ame_dict_v2@_here_
  - /pipeline/base_gen_data@_here_
  - /pipeline/model_sampling@_here_
  - _self_

# =============================================================================
# Target and dataloader
# =============================================================================
task_name: M0096_1chm

dataloader:
  batch_size: 16
  dataset:
    task_name: ${...task_name}
    nres:
      _target_: proteinfoundation.datasets.gen_dataset.UniformInt
      low: ${....motif_target_dict_cfg.${..task_name}.binder_length[0]}
      high: ${oc.select:....motif_target_dict_cfg.${..task_name}.binder_length.1,null}
      nsamples: 4
      endpoint: true
    nrepeat_per_sample: 1
    conditional_features:
      - _target_: proteinfoundation.datasets.gen_dataset.MotifFeatures
        task_name: ${...task_name}
        pdb_path: ${oc.select:.....motif_target_dict_cfg.${.task_name}.target_path,${oc.env:DATA_PATH}/target_data/${.....motif_target_dict_cfg.${.task_name}.source}/${.....motif_target_dict_cfg.${.task_name}.target_filename}.pdb}
        motif_atom_spec: ${.....motif_target_dict_cfg.${.task_name}.contig_atoms}
      - _target_: proteinfoundation.datasets.gen_dataset.LigandFeatures
        task_name: ${...task_name}
        pdb_path: ${oc.select:.....motif_target_dict_cfg.${.task_name}.target_path,${oc.env:DATA_PATH}/target_data/${.....motif_target_dict_cfg.${.task_name}.source}/${.....motif_target_dict_cfg.${.task_name}.target_filename}.pdb}
        ligand: ${.....motif_target_dict_cfg.${.task_name}.ligand}
    transforms:
      # Center both motif and ligand at the motif center of mass
      - _target_: proteinfoundation.datasets.transforms.CoordsTensorCenteringTransform
        tensor_name: "x_motif"
        mask_name: null
        data_mode: "all-atom"
        additional_tensors:
          - tensor_name: "x_target"
            mask_name: "target_mask"

# =============================================================================
# Search algorithm
# =============================================================================
search:
  algorithm: single-pass  # Options: single-pass, best-of-n, beam-search, fk-steering, mcts
  max_batch_size: ${..dataloader.batch_size}
  reward_threshold: null

  # Shared step checkpoints for search algorithms
  step_checkpoints: [0, 100, 200, 300, 400]

  # Algorithm-specific settings
  best_of_n:
    replicas: 2

  beam_search:
    n_branch: 4
    beam_width: 4
    keep_lookahead_samples: true

  fk_steering:
    n_branch: 4
    beam_width: 4
    temperature: 0.1
    keep_lookahead_samples: true

  mcts:
    n_simulations: 20
    exploration_prob: 0.5
    exploration_constant: 1.0
    keep_lookahead_samples: true

# =============================================================================
# Reward model
# =============================================================================
# Default: null (no reward model) for single-pass generation.
# To enable reward-guided search (best-of-n, beam-search, etc.), uncomment the
# CompositeRewardModel block below and switch search.algorithm accordingly.
reward_model: null

