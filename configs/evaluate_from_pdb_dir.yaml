# Binder Evaluation from PDB Directory
#
# Evaluate PDB files from a directory (e.g., external sources like BindCraft, AlphaProteo)
# Binder is expected to be the last chain in each PDB
#
# Usage:
#   # Run evaluate
#   complexa evaluate configs/evaluate_from_pdb_dir.yaml
#
#   # Run analyze (after evaluate)
#   complexa analyze configs/evaluate_from_pdb_dir.yaml
#
#   # With custom PDB directory and target:
#   complexa evaluate configs/evaluate_from_pdb_dir.yaml \
#       sample_storage_path=/path/to/your/pdbs \
#       dataset.task_name=02_PDL1
#
#   # Dry run to see what would be evaluated:
#   complexa analysis configs/evaluate_from_pdb_dir.yaml dryrun=true

defaults:
  - generation/targets_dict@dataset
  - _self_

run_name: pdb_dir_eval_39_7V11_LIGAND #01_PD1
ckpt_path: external
ckpt_name: external_ckpt

# =============================================================================
# Input settings
# =============================================================================
protein_type: binder
input_mode: pdb_dir  # Raw PDB files from directory (not generated job_X_* structure)

# Paths - set your PDB directory here
sample_storage_path: /path/to/samples/processed
# /path/to/samples/01_PD1/processed
# ./tests/test_data/test_pdb_dir
output_dir: ./evaluation_results/${run_name}

# Ignore certain PDB suffixes (e.g., intermediate files)
ignore_generated_pdb_suffix: "_binder.pdb"

# =============================================================================
# Job management & GPU parallelization
# =============================================================================
ncpus_: 24
seed: 5
eval_njobs: 2  # Set to number of GPUs available, or override via CLI
dryrun: false
show_progress: true

# =============================================================================
# Target configuration
# =============================================================================
# Set this to match your binder target
# Examples: 02_PDL1, 38_TNFalpha_REPACK, 22_DerF21
dataset:
  task_name: 39_7V11_LIGAND #01_PD1 #38_TNFalpha_REPACK

# =============================================================================
# Metrics configuration
# =============================================================================
metric:
  # ---------------------------------------------------------------------------
  # Binder refolding metrics (main evaluation)
  # ---------------------------------------------------------------------------
  compute_binder_metrics: true
  
  # Folding method: colabdesign (AF2), rf3_latest, boltz2_default, esmfold
  # binder_folding_method: colabdesign
  binder_folding_method: rf3_latest
  
  # Sequence types to evaluate:
  #   - self: Use the generated sequence as-is
  #   - mpnn: Redesign entire binder with ProteinMPNN
  #   - mpnn_fixed: Redesign non-interface residues only
  sequence_types: [self] #, mpnn, mpnn_fixed]
  
  # Inverse folding settings
  num_redesign_seqs: 8
  interface_cutoff: 8.0
  # inverse_folding_model: soluble_mpnn
  inverse_folding_model: ligand_mpnn
  
  # ESM perplexity metrics
  compute_esm_metrics: false
  
  # Ranking criteria for best refolded sample
  ranking_criteria: null  # Use defaults

  # ---------------------------------------------------------------------------
  # Pre-refolding interface metrics (on input structures)
  # ---------------------------------------------------------------------------
  compute_pre_refolding_metrics: false
  pre_refolding:
    bioinformatics: true   # Shape complementarity, SASA, hydrophobicity
    tmol: true             # TMOL force field (H-bonds, electrostatics)

  # ---------------------------------------------------------------------------
  # Post-refolding interface metrics (on refolded structures)
  # ---------------------------------------------------------------------------
  compute_refolded_structure_metrics: false
  refolded:
    bioinformatics: true
    tmol: true

  # ---------------------------------------------------------------------------
  # Monomer metrics (on extracted binder chain)
  # ---------------------------------------------------------------------------
  compute_monomer_metrics: false
  monomer_folding_models: [esmfold]  # Shared across des/codes

  compute_designability: true
  designability_modes: [ca]
  
  compute_codesignability: true
  codesignability_modes: [ca, all_atom]
  
  compute_co_sequence_recovery: false

  # Secondary structure proportions (alpha helix, beta sheet, coil) via biotite
  compute_ss: true

  # ---------------------------------------------------------------------------
  # Novelty metrics (structure similarity to known databases)
  # ---------------------------------------------------------------------------
  compute_novelty_pdb: false
  compute_novelty_afdb: false
  compute_novelty_afdb_rep_v4: false

  # Output control
  keep_folding_outputs: true

# =============================================================================
# Analysis configuration (for complexa analyze)
# =============================================================================
# result_type: protein_binder
result_type: ligand_binder

aggregation:
  # Sequence types to analyze (auto-detect from results)
  sequence_types: null
  
  # Analysis modes: binder, monomer, or both
  analysis_modes: [binder] #, monomer]
  
  # Diversity computation (shared across all analysis modes)
  compute_diversity: true           # Structural diversity via FoldSeek
  compute_mmseqs_diversity: true    # Sequence diversity via MMseqs2
  # mmseqs_min_seq_id: 0.1   # default 0.1, override to change
  # mmseqs_coverage: 0.7     # default 0.7, override to change

  # Additional monomer aggregation metrics
  compute_residue_type_distribution: true
  
  # Success thresholds (null = use defaults)
  # Default: i_pAE*31 <= 7.0, pLDDT >= 0.9, scRMSD < 1.5
  success_thresholds: null
  
  # Monomer thresholds (null = use default 2.0 Angstrom)
  designability_thresholds: null
  ca_codesignability_thresholds: null
  allatom_codesignability_thresholds: null
